name: Build PS5 Kylin Explorer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            lld \
            libc++-dev \
            libc++abi-dev \
            libstdc++-dev \
            librsvg2-bin \
            imagemagick \
            make \
            git \
            wget

      - name: Setup OpenOrbis Toolchain
        run: |
          echo "Cloning OpenOrbis Toolchain..."
          git clone https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain.git /opt/OpenOrbis-PS4-Toolchain
          echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain" >> $GITHUB_ENV

      - name: Build Project
        run: |
          export OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain
          make

      - name: Upload Built Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps5-kylin-explorer-build
          path: |
            *.elf
            *.pkg
            bin/
            build/
          if-no-files-found: warn
