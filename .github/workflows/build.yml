name: Build PS5 PKG

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch: {}

env:
  OO_PS4_TOOLCHAIN: ${{ github.workspace }}/OpenOrbis-PS4-Toolchain

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout ps5-kylin-explorer
        uses: actions/checkout@v4

      - name: Checkout OpenOrbis PS4 Toolchain
        uses: actions/checkout@v4
        with:
          repository: OpenOrbis/OpenOrbis-PS4-Toolchain
          path: OpenOrbis-PS4-Toolchain
          submodules: recursive

      - name: Install Clang/LLD + image tools
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            clang lld librsvg2-bin imagemagick make

      - name: Verify toolchain env
        run: |
          set -euo pipefail
          echo "OO_PS4_TOOLCHAIN=$OO_PS4_TOOLCHAIN"
          test -d "$OO_PS4_TOOLCHAIN" || { echo "::error::Toolchain checkout missing at $OO_PS4_TOOLCHAIN"; exit 1; }
          # OpenOrbis ships a build/link script the Makefile expects to be executable
          find "$OO_PS4_TOOLCHAIN" -maxdepth 2 -name "*.sh" -exec chmod +x {} \; || true

      - name: Verify required tools are on PATH
        run: |
          set -euo pipefail
          for bin in clang clang++ ld.lld rsvg-convert make; do
            if ! command -v "$bin" >/dev/null 2>&1; then
              echo "::error::Required tool '$bin' not found on PATH"
              exit 1
            fi
          done

          # Ubuntu's 'imagemagick' apt package is ImageMagick 6, which only
          # provides 'convert'/'identify' (no unified 'magick' binary).
          # ImageMagick 7's 'magick' command is what the build expects, so
          # shim it if it's missing but 'convert' is present.
          if command -v magick >/dev/null 2>&1; then
            echo "Found native 'magick' binary."
          elif command -v convert >/dev/null 2>&1; then
            echo "No 'magick' binary (ImageMagick 6 detected) — installing shim wrapping 'convert'."
            printf '%s\n' \
              '#!/usr/bin/env bash' \
              '# Shim: ImageMagick 6 has no unified magick command.' \
              '# "magick <args>" == "convert <args>" for the subset this build uses.' \
              'exec convert "$@"' \
              | sudo tee /usr/local/bin/magick > /dev/null
            sudo chmod +x /usr/local/bin/magick
          else
            echo "::error::Neither 'magick' nor 'convert' found on PATH (ImageMagick not installed correctly)"
            exit 1
          fi

          if ! command -v magick >/dev/null 2>&1; then
            echo "::error::'magick' still not available after shim install"
            exit 1
          fi
          magick -version || { echo "::error::'magick' shim failed to run"; exit 1; }

      - name: Run host unit tests
        run: |
          set -euo pipefail
          make test

      - name: Build eboot
        run: |
          set -euo pipefail
          make eboot
          test -f dist/eboot.bin || { echo "::error::dist/eboot.bin was not produced"; exit 1; }

      - name: Build PKG
        run: |
          set -euo pipefail
          make pkg
          shopt -s nullglob
          pkgs=(dist/*.pkg)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "::error::No .pkg file found in dist/ after 'make pkg'"
            exit 1
          fi
          echo "Built package(s):"
          ls -lh "${pkgs[@]}"

      - name: Upload PKG artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kylin-explorer-pkg
          path: |
            dist/*.pkg
            dist/eboot.bin
            dist/pkg.gp4
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/
          if-no-files-found: ignore
          retention-days: 7
