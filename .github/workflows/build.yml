name: Build PS5 Kylin Explorer PKG

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            lld \
            librsvg2-bin \
            imagemagick \
            make \
            wget \
            tar \
            mono-runtime
          
          # Symlink 'magick' -> 'convert' for ImageMagick asset generation
          sudo ln -s $(which convert) /usr/local/bin/magick

      - name: Setup OpenOrbis Toolchain
        run: |
          mkdir -p /opt/OpenOrbis-PS4-Toolchain
          
          # Download official prebuilt OpenOrbis toolchain (includes create-eboot & create-pkg)
          wget -q https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz
          tar -xzf toolchain-llvm-18.tar.gz -C /opt/OpenOrbis-PS4-Toolchain --strip-components=2
          
          echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain" >> $GITHUB_ENV

      - name: Build ELF and Package PKG
        run: |
          export OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain
          export PATH=$OO_PS4_TOOLCHAIN/bin:$PATH

          # Try building via 'make pkg' first if supported by the Makefile
          if grep -q "^pkg:" Makefile; then
            make pkg
          else
            # Manual packaging fallback using OpenOrbis tools
            make
            
            # Convert ELF to eboot.bin
            create-eboot --in=ps5-kylin-explorer.elf --out=eboot.bin --real
            
            # Package into PKG using project's gp4 or param.sfo
            if [ -f "pkg.gp4" ]; then
              create-pkg --in=pkg.gp4 --out=.
            fi
          fi

      - name: Upload Built PKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps5-kylin-explorer-pkg
          path: |
            *.pkg
            *.elf
          if-no-files-found: warn
