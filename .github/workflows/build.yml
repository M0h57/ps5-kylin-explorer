name: Build PS5 Kylin Explorer PKG

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies & OpenSSL 1.1
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            lld \
            librsvg2-bin \
            imagemagick \
            make \
            wget \
            tar \
            rsync

          # ImageMagick command symlink
          sudo ln -sf $(which convert) /usr/local/bin/magick

          # OpenSSL 1.1 required by PkgTool.Core
          wget http://security.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb

      - name: Setup OpenOrbis Toolchain
        run: |
          mkdir -p /opt/OpenOrbis-PS4-Toolchain
          wget -q https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz
          tar -xzf toolchain-llvm-18.tar.gz -C /opt/OpenOrbis-PS4-Toolchain --strip-components=2
          echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain" >> $GITHUB_ENV

      - name: Build PKG Package
        run: |
          export OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain
          make

      - name: Upload PKG and ELF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps5-kylin-explorer-pkg
          path: |
            **/*.pkg
            build/obj/*.elf
          if-no-files-found: error
