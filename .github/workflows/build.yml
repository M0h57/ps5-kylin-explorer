name: Build PS5 Kylin Explorer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            lld \
            libc++-dev \
            libc++abi-dev \
            libstdc++-14-dev \
            librsvg2-bin \
            imagemagick \
            make \
            git \
            wget \
            python3

      - name: Setup OpenOrbis Toolchain
        run: |
          echo "Cloning OpenOrbis Toolchain..."
          git clone --recursive https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain.git /opt/OpenOrbis-PS4-Toolchain
          
          # Run the OpenOrbis toolchain initialization script if present
          if [ -f /opt/OpenOrbis-PS4-Toolchain/update.sh ]; then
            cd /opt/OpenOrbis-PS4-Toolchain && bash update.sh
          fi

          echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain" >> $GITHUB_ENV

      - name: Build Project
        run: |
          export OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain
          
          # Map standard C++ headers into the include path for Clang
          export CPLUS_INCLUDE_PATH=/usr/include/c++/14:/usr/include/x86_64-linux-gnu/c++/14:$OO_PS4_TOOLCHAIN/include/c++/v1:$OO_PS4_TOOLCHAIN/include:$CPLUS_INCLUDE_PATH
          
          make

      - name: Upload Built Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps5-kylin-explorer-build
          path: |
            *.elf
            *.pkg
            bin/
            build/
          if-no-files-found: warn
