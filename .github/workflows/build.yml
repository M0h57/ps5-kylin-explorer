name: Build PS5 Kylin Explorer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            lld \
            librsvg2-bin \
            imagemagick \
            make \
            wget \
            tar

      - name: Setup OpenOrbis Toolchain Release
        run: |
          mkdir -p /opt/OpenOrbis-PS4-Toolchain
          
          # Download and extract official prebuilt OpenOrbis toolchain
          wget -q https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz
          tar -xzf toolchain-llvm-18.tar.gz -C /opt/OpenOrbis-PS4-Toolchain --strip-components=2
          
          echo "OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain" >> $GITHUB_ENV

      - name: Build Project
        run: |
          export OO_PS4_TOOLCHAIN=/opt/OpenOrbis-PS4-Toolchain
          
          # Run make using the prebuilt toolchain headers
          make

      - name: Upload Built Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps5-kylin-explorer-build
          path: |
            *.elf
            *.pkg
            bin/
            build/
          if-no-files-found: warn
