name: Build PS5 PKG

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch: {}

env:
  OO_PS4_TOOLCHAIN: ${{ github.workspace }}/OpenOrbis-PS4-Toolchain

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout ps5-kylin-explorer
        uses: actions/checkout@v4

      - name: Download prebuilt OpenOrbis PS4 Toolchain
        run: |
          set -euo pipefail
          # IMPORTANT: git-cloning the toolchain *source* repo only gives you
          # build scripts, not a compiled sysroot — that produces
          # "fatal error: 'sstream' file not found" because the libc++
          # headers/libs are never generated. We must use the prebuilt
          # release tarball instead, which ships include/, lib/, and bin/
          # already built. Asset name/version verified against the actual
          # v0.5.4 release assets (not guessed) — check for a newer release
          # at https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases
          # if this ever starts 404ing.
          TOOLCHAIN_URL="https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz"
          mkdir -p "$OO_PS4_TOOLCHAIN"
          curl -fL "$TOOLCHAIN_URL" -o toolchain.tar.gz
          # Archive layout is OpenOrbis/PS4Toolchain/<contents> - strip both
          # leading path components so $OO_PS4_TOOLCHAIN/include etc. exist.
          tar -xzf toolchain.tar.gz -C "$OO_PS4_TOOLCHAIN" --strip-components=2
          rm -f toolchain.tar.gz
          chmod +x "$OO_PS4_TOOLCHAIN"/bin/linux/* || true
          find "$OO_PS4_TOOLCHAIN/scripts" -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

      - name: Install Clang/LLD + image tools
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            clang lld librsvg2-bin imagemagick make

      - name: Install libssl1.1 (required by PkgTool.Core pkg_build)
        run: |
          set -euo pipefail
          # PkgTool.Core dlopen()'s libssl at runtime for pkg_build's signing
          # step, so it doesn't show up via ldd - only fails at actual pkg
          # build time with "No usable version of libssl was found".
          # Ubuntu 24.04 runners ship only libssl3; libssl1.1 must be
          # installed manually since it's no longer in the default repos.
          curl -fsSL -o /tmp/libssl1.1.deb \
            "http://security.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb"
          sudo dpkg -i /tmp/libssl1.1.deb
          rm -f /tmp/libssl1.1.deb
          ldconfig -p | grep -q libssl.so.1.1 || { echo "::error::libssl.so.1.1 still not registered after install"; exit 1; }

      - name: Verify toolchain env
        run: |
          set -euo pipefail
          echo "OO_PS4_TOOLCHAIN=$OO_PS4_TOOLCHAIN"
          test -d "$OO_PS4_TOOLCHAIN" || { echo "::error::Toolchain dir missing at $OO_PS4_TOOLCHAIN"; exit 1; }
          for d in include lib bin; do
            test -d "$OO_PS4_TOOLCHAIN/$d" || { echo "::error::Expected $OO_PS4_TOOLCHAIN/$d not found — tarball layout may have changed"; exit 1; }
          done
          test -f "$OO_PS4_TOOLCHAIN/include/c++/v1/sstream" || { echo "::error::libc++ headers missing (sstream) — sysroot is incomplete"; exit 1; }
          echo "Toolchain sysroot looks complete."

      - name: Verify required tools are on PATH
        run: |
          set -euo pipefail
          for bin in clang clang++ ld.lld rsvg-convert make; do
            if ! command -v "$bin" >/dev/null 2>&1; then
              echo "::error::Required tool '$bin' not found on PATH"
              exit 1
            fi
          done

          # Ubuntu's 'imagemagick' apt package is ImageMagick 6, which only
          # provides 'convert'/'identify' (no unified 'magick' binary).
          # ImageMagick 7's 'magick' command is what the build expects, so
          # shim it if it's missing but 'convert' is present.
          if command -v magick >/dev/null 2>&1; then
            echo "Found native 'magick' binary."
          elif command -v convert >/dev/null 2>&1; then
            echo "No 'magick' binary (ImageMagick 6 detected) — installing shim wrapping 'convert'."
            printf '%s\n' \
              '#!/usr/bin/env bash' \
              '# Shim: ImageMagick 6 has no unified magick command.' \
              '# "magick <args>" == "convert <args>" for the subset this build uses.' \
              'exec convert "$@"' \
              | sudo tee /usr/local/bin/magick > /dev/null
            sudo chmod +x /usr/local/bin/magick
          else
            echo "::error::Neither 'magick' nor 'convert' found on PATH (ImageMagick not installed correctly)"
            exit 1
          fi

          if ! command -v magick >/dev/null 2>&1; then
            echo "::error::'magick' still not available after shim install"
            exit 1
          fi
          magick -version || { echo "::error::'magick' shim failed to run"; exit 1; }

      - name: Run host unit tests
        run: |
          set -euo pipefail
          make test

      - name: Build eboot
        run: |
          set -euo pipefail
          make eboot
          test -f dist/eboot.bin || { echo "::error::dist/eboot.bin was not produced"; exit 1; }

      - name: Build PKG
        run: |
          set -euo pipefail
          make pkg
          shopt -s nullglob
          pkgs=(dist/*.pkg)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "::error::No .pkg file found in dist/ after 'make pkg'"
            exit 1
          fi
          echo "Built package(s):"
          ls -lh "${pkgs[@]}"

      - name: Upload PKG artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kylin-explorer-pkg
          path: |
            dist/*.pkg
            dist/eboot.bin
            dist/pkg.gp4
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/
          if-no-files-found: ignore
          retention-days: 7
